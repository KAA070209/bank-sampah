<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approval Nasabah</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f9b0f,#56ab2f);
    padding:40px;
}

.container {
    background:white;
    padding:30px;
    border-radius:15px;
    max-width:900px;
    margin:auto;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom:20px;
    color:#0f9b0f;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:12px;
    border-bottom:1px solid #eee;
}

th {
    background:#f0fdf4;
}

button {
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.approve {
    background:#0f9b0f;
    color:white;
}

.reject {
    background:#ff4d4d;
    color:white;
}
</style>
</head>
<body>

<div class="container">
    <h2>Nasabah Pending Approval</h2>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div style="background:#0f9b0f;color:white;padding:10px;border-radius:8px;margin-bottom:15px;">
            {{ messages[0] }}
        </div>
    {% endif %}
    {% endwith %}

    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>Username</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.nama }}</td>
                <td>{{ user.username }}</td>
                <td>
                    <a href="/approve/{{ user.id }}">
                        <button class="approve">Approve</button>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <br>
    <a href="/admin_dashboard">← Kembali ke Dashboard</a>

</div>

</body>
</html>
